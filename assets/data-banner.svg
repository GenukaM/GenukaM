<svg viewBox="0 0 1000 230" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated data science banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b27"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#3b5bdb"/>
      <stop offset="1" stop-color="#58a6ff"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="0.5" stop-color="#9d7bff"/>
      <stop offset="1" stop-color="#58a6ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .bar   { transform-box: fill-box; transform-origin: 50% 100%; animation: grow 3.2s ease-in-out infinite; }
      .b2 { animation-delay: .2s } .b3 { animation-delay: .4s } .b4 { animation-delay: .6s }
      .b5 { animation-delay: .8s } .b6 { animation-delay: 1s } .b7 { animation-delay: 1.2s } .b8 { animation-delay: 1.4s }
      @keyframes grow { 0%,100% { transform: scaleY(.35) } 50% { transform: scaleY(1) } }
      .trace { stroke-dasharray: 1200; stroke-dashoffset: 1200; animation: draw 6s ease-in-out infinite; }
      @keyframes draw { 0% { stroke-dashoffset: 1200 } 45% { stroke-dashoffset: 0 } 90%,100% { stroke-dashoffset: 0 } }
      .dot { animation: pulse 2s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { r: 4; opacity: 1 } 50% { r: 7; opacity: .55 } }
      .p { animation: float 5s linear infinite; }
      .p2 { animation-delay: 1.5s } .p3 { animation-delay: 3s } .p4 { animation-delay: 2.2s }
      @keyframes float { 0% { transform: translateY(0); opacity: 0 } 15% { opacity: .9 } 100% { transform: translateY(-130px); opacity: 0 } }
      .title { animation: fade 4s ease-in-out infinite; }
      @keyframes fade { 0%,100% { opacity: .55 } 50% { opacity: 1 } }
    </style>
  </defs>

  <rect width="1000" height="230" rx="16" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#2a3142" stroke-width="1" opacity="0.5">
    <line x1="0" y1="60" x2="1000" y2="60"/>
    <line x1="0" y1="110" x2="1000" y2="110"/>
    <line x1="0" y1="160" x2="1000" y2="160"/>
  </g>

  <!-- bars -->
  <g>
    <rect class="bar"    x="80"  y="100" width="26" height="100" rx="5" fill="url(#bar)"/>
    <rect class="bar b2" x="120" y="100" width="26" height="100" rx="5" fill="url(#bar)"/>
    <rect class="bar b3" x="160" y="100" width="26" height="100" rx="5" fill="url(#bar)"/>
    <rect class="bar b4" x="200" y="100" width="26" height="100" rx="5" fill="url(#bar)"/>
    <rect class="bar b5" x="240" y="100" width="26" height="100" rx="5" fill="url(#bar)"/>
    <rect class="bar b6" x="280" y="100" width="26" height="100" rx="5" fill="url(#bar)"/>
    <rect class="bar b7" x="320" y="100" width="26" height="100" rx="5" fill="url(#bar)"/>
    <rect class="bar b8" x="360" y="100" width="26" height="100" rx="5" fill="url(#bar)"/>
  </g>

  <!-- self-drawing line chart -->
  <polyline class="trace" filter="url(#glow)" fill="none" stroke="url(#line)" stroke-width="3.5"
    stroke-linecap="round" stroke-linejoin="round"
    points="460,150 520,120 580,135 640,80 700,105 760,55 820,90 900,45"/>
  <circle class="dot" cx="900" cy="45" r="4" fill="#9d7bff" filter="url(#glow)"/>

  <!-- floating data particles -->
  <g fill="#58a6ff">
    <circle class="p"    cx="500" cy="200" r="2.5"/>
    <circle class="p p2" cx="620" cy="200" r="3"/>
    <circle class="p p3" cx="740" cy="200" r="2"/>
    <circle class="p p4" cx="850" cy="200" r="2.5"/>
  </g>

  <!-- title -->
  <text class="title" x="80" y="48" font-family="Segoe UI, Helvetica, Arial, sans-serif"
    font-size="22" font-weight="700" letter-spacing="3" fill="#c9d1e6">
    DATA · MACHINE LEARNING · AI
  </text>
</svg>
